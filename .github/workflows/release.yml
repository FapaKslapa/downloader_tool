name: Release Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Download Sidecar Binaries (yt-dlp & ffmpeg)
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            curl -L -o src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
            curl -L -o ffmpeg-win.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
            unzip ffmpeg-win.zip
            cp ffmpeg-master-latest-win64-gpl/bin/ffmpeg.exe src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
            rm -rf ffmpeg-win.zip ffmpeg-master-latest-win64-gpl
          fi
          if [ "${{ matrix.platform }}" = "macos-latest" ]; then
            curl -L -o yt-dlp-mac https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
            chmod +x yt-dlp-mac
            cp yt-dlp-mac src-tauri/binaries/yt-dlp-x86_64-apple-darwin
            cp yt-dlp-mac src-tauri/binaries/yt-dlp-aarch64-apple-darwin
            rm yt-dlp-mac
            curl -L -o src-tauri/binaries/ffmpeg-x86_64-apple-darwin https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-x64
            curl -L -o src-tauri/binaries/ffmpeg-aarch64-apple-darwin https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-darwin-arm64
            chmod +x src-tauri/binaries/ffmpeg-x86_64-apple-darwin
            chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          fi

      - name: Install Frontend Dependencies
        run: pnpm install

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'TubeGrab v__VERSION__'
          releaseBody: 'Nuovo rilascio automatico per TubeGrab'
          releaseDraft: true
          prerelease: false

      - name: Collect Packages
        shell: bash
        run: |
          mkdir -p packages
          # Copy macOS packages
          if [ -d "src-tauri/target/release/bundle/dmg" ]; then
            cp src-tauri/target/release/bundle/dmg/*.dmg packages/ 2>/dev/null || true
          fi
          if [ -d "src-tauri/target/release/bundle/macos" ]; then
            cp src-tauri/target/release/bundle/macos/*.app.tar.gz packages/ 2>/dev/null || true
          fi
          # Copy Windows packages
          if [ -d "src-tauri/target/release/bundle/msi" ]; then
            cp src-tauri/target/release/bundle/msi/*.msi packages/ 2>/dev/null || true
          fi
          if [ -d "src-tauri/target/release/bundle/nsis" ]; then
            cp src-tauri/target/release/bundle/nsis/*.exe packages/ 2>/dev/null || true
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.platform }}
          path: packages/
